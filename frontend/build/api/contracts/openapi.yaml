openapi: 3.0.3
info:
  title: FastStart API
  version: 1.0.0
  description: Case triage intake, caseworker, and admin APIs

servers:
  - url: https://{apiId}.execute-api.{region}.amazonaws.com
    variables:
      apiId: { default: "" }
      region: { default: "us-east-1" }

security:
  - bearerAuth: []

paths:
  /applications/init:
    post:
      summary: Initialize application (intake)
      operationId: applicationInit
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApplicationInitRequest"
      responses:
        "200":
          description: Success
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApplicationInitResponse"
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
      headers:
        Idempotency-Key:
          required: true
          schema: { type: string, format: uuid }

  /applications/complete:
    post:
      summary: Finalize intake and trigger AI
      operationId: applicationComplete
      requestBody:
        content:
          application/json:
            schema: { required: [caseId], properties: { caseId: { type: string } } }
      responses:
        "200": { description: Success }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
      headers:
        Idempotency-Key: { schema: { type: string, format: uuid } }

  /applications/{caseId}/decision:
    get:
      summary: Get decision (upstream/citizen)
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  caseId: { type: string }
                  decision: { type: string, enum: [APPROVED, DECLINED, ESCALATED, PENDING] }
                  reason: { type: string }
                  decidedAt: { type: string, format: date-time }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/cases:
    get:
      summary: List cases (caseworker)
      parameters:
        - name: status
          in: query
          schema: { type: string }
        - name: page
          in: query
          schema: { type: integer, default: 1 }
        - name: limit
          in: query
          schema: { type: integer, default: 20 }
      responses:
        "200":
          content:
            application/json:
              schema:
                type: object
                properties:
                  cases: { type: array, items: { $ref: "#/components/schemas/CaseSummary" } }
                  pagination: { $ref: "#/components/schemas/Pagination" }

  /api/cases/{caseId}:
    get:
      summary: Get case detail
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Case detail with AI analysis }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }

  /api/cases/{caseId}/decision:
    post:
      summary: Record human decision
      requestBody:
        content:
          application/json:
            schema:
              required: [decision, justification]
              properties:
                decision: { type: string, enum: [APPROVED, DECLINED, ESCALATED, PENDING] }
                justification: { type: string, minLength: 10 }
                sendEmail: { type: boolean }
      responses:
        "200": { description: Decision recorded }
        "400": { $ref: "#/components/responses/BadRequest" }
        "409": { $ref: "#/components/responses/Conflict" }
      headers:
        Idempotency-Key: { schema: { type: string, format: uuid } }

  /api/cases/{caseId}/lineage:
    get:
      summary: Get case lineage (P1)
      parameters:
        - name: caseId
          in: path
          required: true
          schema: { type: string }
      responses:
        "200": { description: Lineage with policy and model versions }

  /api/users/me:
    get:
      summary: Current user profile
    put:
      summary: Update own profile

  /api/users/me/sessions:
    get:
      summary: List active sessions (P1)
  /api/users/me/sessions/revoke-all:
    post:
      summary: Revoke all other sessions (P1)

  /api/users/invite:
    post:
      summary: Invite user (Admin)
      requestBody:
        content:
          application/json:
            schema:
              required: [email, role, organisationId]
              properties:
                email: { type: string, format: email }
                role: { type: string, enum: [Caseworker, Manager, Administrator] }
                organisationId: { type: string }
                firstName: { type: string }
                lastName: { type: string }

  /api/organisations:
    get:
      summary: List organisations (Admin)
    post:
      summary: Create organisation (P1)

  /api/admin/events/replay:
    post:
      summary: Replay event (Admin, P0)
      requestBody:
        content:
          application/json:
            schema:
              required: [caseId, detailType]
              properties:
                caseId: { type: string }
                detailType: { type: string }

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  schemas:
    ApplicationInitRequest:
      required: [orgId, caseType, submissionType, applicant]
      properties:
        caseId: { type: string }
        orgId: { type: string }
        caseType: { type: string }
        submissionType: { type: string, enum: [NEW, AMENDMENT, APPEAL] }
        applicant: { type: object }
        documents-to-upload: { type: array }
        submittedAt: { type: string, format: date-time }
    ApplicationInitResponse:
      properties:
        caseId: { type: string }
        policyVersion: { type: integer }
        requiredDocuments: { type: array }
        uploadUrls: { type: object }
    CaseSummary:
      properties:
        caseId: { type: string }
        status: { type: string }
        applicantName: { type: string }
        submittedAt: { type: string, format: date-time }
    Pagination:
      properties:
        page: { type: integer }
        limit: { type: integer }
        total: { type: integer }
        totalPages: { type: integer }
    Error:
      properties:
        error:
          type: object
          properties:
            code: { type: string }
            message: { type: string }
            requestId: { type: string }
            timestamp: { type: string, format: date-time }
  responses:
    BadRequest: { description: Bad Request }
    Forbidden: { description: Forbidden }
    NotFound: { description: Not Found }
    Conflict: { description: Conflict }
